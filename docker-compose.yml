services:
  postgres:
    image: postgres:16-alpine
    container_name: pointnear-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pointnear
      POSTGRES_PASSWORD: pointnear
      POSTGRES_DB: pointnear
    ports:
      - "5432:5432"
    volumes:
      - pointnear-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pointnear -d pointnear"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: pointnear-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://pointnear:pointnear@postgres:5432/pointnear?schema=public
      JWT_ACCESS_SECRET: replace-with-a-long-random-access-secret
      JWT_REFRESH_SECRET: replace-with-a-long-random-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN_DAYS: 7
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "3333:3333"

volumes:
  pointnear-postgres-data:
